<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TheSlap.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-the">the</span><span class="logo-slap">Slap</span><span class="logo-dot">.com</span>
      </div>
      <nav class="header-nav">
        <a href="#" class="nav-link active">Feed</a>
        <a href="#" class="nav-link">Videos</a>
        <a href="#" class="nav-link">Profiles</a>
      </nav>
      <div class="header-user" id="headerUser">
        <button class="btn btn-login" id="loginBtn">Log In</button>
        <button class="btn btn-signup" id="signupBtn">Sign Up</button>
      </div>
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <div class="site-wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-profile" id="sidebarProfile">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar" id="sidebarAvatar">?</div>
        </div>
        <div class="profile-name" id="sidebarName">Guest</div>
        <div class="profile-handle" id="sidebarHandle">@theslap</div>
        <div class="profile-stats">
          <div class="stat"><span class="stat-num" id="statPosts">0</span><span class="stat-label">Posts</span></div>
          <div class="stat"><span class="stat-num" id="statLikes">0</span><span class="stat-label">Slaps</span></div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-title">Who's Slappin'</div>
        <ul class="who-list" id="whoList">
          <li class="who-item skeleton"></li>
          <li class="who-item skeleton"></li>
          <li class="who-item skeleton"></li>
        </ul>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-title">Trending Tags</div>
        <div class="tag-cloud" id="tagCloud">
          <span class="tag">#Hollywood Arts</span>
          <span class="tag">#Beck</span>
          <span class="tag">#Jade</span>
          <span class="tag">#Tori</span>
          <span class="tag">#Cat</span>
          <span class="tag">#Robbie</span>
          <span class="tag">#Andre</span>
        </div>
      </div>
    </aside>

    <!-- MAIN FEED -->
    <main class="feed-area">

      <!-- POST COMPOSER -->
      <div class="composer card" id="composer">
        <div class="composer-top">
          <div class="composer-avatar" id="composerAvatar">?</div>
          <textarea
            class="composer-input"
            id="composerInput"
            placeholder="What's happening at Hollywood Arts?"
            maxlength="280"
          ></textarea>
        </div>
        <div class="composer-bottom">
          <div class="composer-options">
            <button class="composer-opt" id="addVideoBtn" title="Add video link">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
              Video
            </button>
          </div>
          <div class="composer-right">
            <span class="char-count" id="charCount">280</span>
            <button class="btn btn-post" id="postBtn" disabled>Slap it!</button>
          </div>
        </div>
        <div class="video-url-wrap hidden" id="videoUrlWrap">
          <input type="url" class="video-url-input" id="videoUrlInput" placeholder="Paste YouTube or video URL..." />
        </div>
      </div>

      <!-- FEED TABS -->
      <div class="feed-tabs">
        <button class="feed-tab active" data-tab="all">All Slaps</button>
        <button class="feed-tab" data-tab="videos">Videos</button>
        <button class="feed-tab" data-tab="status">Status</button>
      </div>

      <!-- POSTS FEED -->
      <div class="posts-feed" id="postsFeed">
        <div class="loading-spinner" id="feedSpinner">
          <div class="spinner"></div>
        </div>
      </div>

    </main>
  </div>

  <!-- AUTH MODAL -->
  <div class="modal-overlay hidden" id="authModal">
    <div class="modal card">
      <button class="modal-close" id="modalClose">&times;</button>

      <div class="modal-tabs">
        <button class="modal-tab active" id="tabLogin">Log In</button>
        <button class="modal-tab" id="tabSignup">Sign Up</button>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginUsername" placeholder="ToriVega" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <div class="form-error hidden" id="loginError"></div>
        <button type="submit" class="btn btn-post full-width">Log In</button>
      </form>

      <!-- Signup Form -->
      <form class="auth-form hidden" id="signupForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="signupUsername" placeholder="ToriVega" required maxlength="30" autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password" />
        </div>
        <div class="form-error hidden" id="signupError"></div>
        <button type="submit" class="btn btn-post full-width">Join TheSlap!</button>
      </form>
    </div>
  </div>

  <!-- POST TEMPLATE (hidden, cloned by JS) -->
  <template id="postTemplate">
    <article class="post card">
      <div class="post-header">
        <div class="post-avatar"></div>
        <div class="post-meta">
          <span class="post-username"></span>
          <span class="post-handle"></span>
          <span class="post-time"></span>
        </div>
      </div>
      <div class="post-body">
        <p class="post-text"></p>
        <div class="post-video hidden">
          <iframe class="video-embed" frameborder="0" allowfullscreen></iframe>
        </div>
      </div>
      <div class="post-actions">
        <button class="action-btn slap-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
          <span class="slap-count">0</span> Slaps
        </button>
        <button class="action-btn comment-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          Comment
        </button>
      </div>
      <div class="comments-section hidden">
        <div class="comments-list"></div>
        <div class="comment-composer">
          <input type="text" class="comment-input" placeholder="Leave a comment..." maxlength="200" />
          <button class="btn btn-comment-submit">Post</button>
        </div>
      </div>
    </article>
  </template>

  <script type="module" src="js/app.js"></script>
</body>
</html>
